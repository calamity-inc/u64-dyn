name: C++

on:
  push:
    branches:
      - senpai
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        working-directory: cpp
        run: g++ -std=c++17 test.cpp -o test
      - name: Run tests
        working-directory: cpp
        run: ./test
